<!DOCTYPE html>
<html lang="en" data-theme="warm">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1e1510">
<meta name="color-scheme" content="dark">
<link rel="manifest" href="manifest.json">
<title>Dominiao</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700;800&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css?v=15">
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Background layers -->
<div class="wood-grain"></div>
<div class="stadium-grid"></div>

<div class="scroll-y" id="mainScroll">
  <!-- Top bar -->
  <div class="top-bar">
    <div class="logo">
      <svg width="14" height="28" viewBox="0 0 100 200">
        <rect x="1" y="1" width="98" height="198" rx="8" fill="var(--app-bg)" stroke="var(--fg)" stroke-opacity="0.2" stroke-width="1"/>
        <circle cx="30" cy="20" r="7" fill="var(--fg)"/><circle cx="70" cy="20" r="7" fill="var(--fg)"/>
        <circle cx="30" cy="50" r="7" fill="var(--fg)"/><circle cx="70" cy="50" r="7" fill="var(--fg)"/>
        <circle cx="30" cy="80" r="7" fill="var(--fg)"/><circle cx="70" cy="80" r="7" fill="var(--fg)"/>
        <line x1="15" y1="100" x2="85" y2="100" stroke="var(--fg)" stroke-opacity="0.25" stroke-width="1"/>
        <circle cx="30" cy="120" r="7" fill="var(--fg)"/><circle cx="70" cy="120" r="7" fill="var(--fg)"/>
        <circle cx="30" cy="150" r="7" fill="var(--fg)"/><circle cx="70" cy="150" r="7" fill="var(--fg)"/>
        <circle cx="30" cy="180" r="7" fill="var(--fg)"/><circle cx="70" cy="180" r="7" fill="var(--fg)"/>
      </svg>
      <div class="logo-text">Dominiao</div>
    </div>
    <div class="controls">
      <div class="seg-toggle" id="langToggle">
        <button id="langEs" onclick="setLang('es')">ES</button>
        <button id="langEn" onclick="setLang('en')">EN</button>
      </div>
      <button class="icon-btn" onclick="openSettings()" aria-label="Settings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--fg-muted)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 15a3 3 0 100-6 3 3 0 000 6z M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33h0a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82v0a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mode chip -->
  <div class="mode-chip">
    <button class="mode-chip-btn" onclick="toggleModeDropdown()">
      <div class="inner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--fg-muted)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3a9 9 0 100 18 9 9 0 000-18z M12 7a5 5 0 100 10 5 5 0 000-10z M12 11a1 1 0 100 2 1 1 0 000-2z"/>
        </svg>
        <span class="mode-label" id="modeLabelText"></span>
        <span class="mode-val" id="modeValText"></span>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--fg-muted)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 9l6 6 6-6"/>
      </svg>
    </button>
    <div class="mode-dropdown" id="modeDropdown" style="display:none"></div>
  </div>

  <!-- Team cards -->
  <div class="team-cards">
    <div class="team-card" id="cardA">
      <div id="nameDisplayA">
        <button class="team-name-btn" style="color:var(--team-a)" onclick="startEditName('a')">
          <span class="dot" style="background:var(--team-a);box-shadow:0 0 6px var(--team-a-glow)"></span>
          <span id="nameTextA"></span>
          <span class="edit-hint">&#9998;</span>
        </button>
      </div>
      <div id="nameEditA" style="display:none">
        <input class="team-name-input" id="nameInputA" maxlength="12">
      </div>
      <div class="score-digits" id="scoreA">000</div>
      <div class="progress-bar" id="progressA"></div>
      <div class="progress-info">
        <span id="toGoA"></span>
        <span id="targetA" style="opacity:0.6"></span>
      </div>
    </div>
    <div class="team-card" id="cardB">
      <div id="nameDisplayB">
        <button class="team-name-btn" style="color:var(--team-b)" onclick="startEditName('b')">
          <span class="dot" style="background:var(--team-b);box-shadow:0 0 6px var(--team-b-glow)"></span>
          <span id="nameTextB"></span>
          <span class="edit-hint">&#9998;</span>
        </button>
      </div>
      <div id="nameEditB" style="display:none">
        <input class="team-name-input" id="nameInputB" maxlength="12">
      </div>
      <div class="score-digits" id="scoreB">000</div>
      <div class="progress-bar" id="progressB"></div>
      <div class="progress-info">
        <span id="toGoB"></span>
        <span id="targetB" style="opacity:0.6"></span>
      </div>
    </div>
  </div>

  <!-- Add points -->
  <div class="add-section">
    <div class="points-row-dual">
      <div class="points-field points-field-a">
        <input type="number" inputmode="numeric" class="points-input" id="pointsInputA" placeholder="">
      </div>
      <div class="points-field points-field-b">
        <input type="number" inputmode="numeric" class="points-input" id="pointsInputB" placeholder="">
      </div>
    </div>
    <button class="add-round-btn" id="addBtn" onclick="submitPoints()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <path d="M12 5v14 M5 12h14"/>
      </svg>
      <span id="addRoundLabel"></span>
    </button>
    <div id="bonusArea"></div>
  </div>

  <!-- Round history -->
  <div class="history">
    <div class="history-header">
      <div class="label" id="roundsLabel"></div>
      <div class="label-sm" id="roundsCount"></div>
    </div>
    <div id="historyContent"></div>
  </div>

  <div style="height:12px"></div>
</div>

<!-- Bottom bar -->
<div class="bottom-bar">
  <button class="bar-btn" id="undoBtn" onclick="undoRound()" disabled>
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 14L4 9l5-5 M4 9h11a5 5 0 010 10h-4"/>
    </svg>
    <span id="undoLabel"></span>
  </button>
  <button class="bar-btn" id="shareBtn" onclick="shareScore()">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2v14 M7 7l5-5 5 5 M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"/>
    </svg>
    <span id="shareLabel"></span>
  </button>
  <button class="bar-btn primary" id="newGameBtn" onclick="openNewGameConfirm()">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 0116-5l2 2 M21 12a9 9 0 01-16 5l-2-2 M17 4v5h-5 M7 20v-5h5"/>
    </svg>
    <span id="newGameLabel"></span>
  </button>
</div>

<!-- Win overlay -->
<div class="win-overlay" id="winOverlay">
  <div id="confettiBox" style="position:absolute;inset:0;overflow:hidden;pointer-events:none"></div>
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;position:relative">
    <div id="winTrophy" style="align-self:center;margin-bottom:20px;width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 21h8 M12 17v4 M7 4h10v5a5 5 0 01-10 0V4z M17 6h2a2 2 0 01-2 4 M7 6H5a2 2 0 002 4"/>
      </svg>
    </div>
    <div class="label" id="winLabel" style="color:var(--gold-glow);margin-bottom:10px"></div>
    <div id="winName" style="font-family:var(--font-display);font-size:48px;font-weight:400;font-style:italic;color:var(--fg);letter-spacing:0.02em;line-height:1"></div>
    <div id="winScoreCard" style="align-self:center;margin-top:24px;padding:16px 28px;border-radius:14px;display:flex;align-items:center;gap:20px;background:var(--surface);border:1px solid var(--divider)"></div>
    <div id="winStats" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:18px;padding:0 8px"></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px;padding-bottom:var(--safe-bottom)">
    <button id="winNewGame" onclick="newGame();closeOverlay('winOverlay')" style="height:50px;border-radius:12px;color:#fff;font-size:14px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase"></button>
    <div style="display:flex;gap:8px">
      <button id="winKeep" onclick="closeOverlay('winOverlay')" style="flex:1;height:46px;border-radius:12px;background:var(--input-bg);border:1px solid var(--divider);color:var(--fg);font-size:13px;font-weight:500"></button>
      <button onclick="shareScore();closeOverlay('winOverlay')" style="flex:1;height:46px;border-radius:12px;background:var(--input-bg);border:1px solid var(--divider);color:var(--fg);font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2v14 M7 7l5-5 5 5 M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"/>
        </svg>
        <span id="winShareLabel"></span>
      </button>
    </div>
  </div>
</div>

<!-- New game confirm -->
<div class="overlay-bg confirm-bg" id="newGameConfirm" onclick="closeOverlay('newGameConfirm')">
  <div class="confirm-card" onclick="event.stopPropagation()">
    <div class="title" id="confirmTitle"></div>
    <div class="msg" id="confirmMsg"></div>
    <div class="btns">
      <button class="btn-cancel" onclick="closeOverlay('newGameConfirm')" id="confirmCancel"></button>
      <button class="btn-confirm" onclick="newGame();closeOverlay('newGameConfirm')" id="confirmOk"></button>
    </div>
  </div>
</div>

<!-- Mode switch confirm -->
<div class="overlay-bg confirm-bg" id="modeSwitchConfirm" onclick="closeOverlay('modeSwitchConfirm')">
  <div class="confirm-card" onclick="event.stopPropagation()">
    <div class="title" id="modeConfirmTitle"></div>
    <div class="msg" id="modeConfirmMsg"></div>
    <div class="btns">
      <button class="btn-cancel" onclick="closeOverlay('modeSwitchConfirm')" id="modeConfirmCancel"></button>
      <button class="btn-confirm" onclick="confirmModeSwitch()" id="modeConfirmOk"></button>
    </div>
  </div>
</div>

<!-- Settings sheet -->
<div class="overlay-bg bottom settings-bg" id="settingsOverlay" onclick="closeOverlay('settingsOverlay')">
  <div class="settings-sheet" onclick="event.stopPropagation()">
    <div class="handle"></div>
    <div class="sheet-title" id="settingsTitle"></div>
    <div class="setting-row">
      <div class="setting-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3a9 9 0 100 18 9 9 0 000-18z M3 12h18 M12 3a13 13 0 010 18 M12 3a13 13 0 000 18"/>
        </svg>
      </div>
      <div class="setting-label" id="langLabel"></div>
      <div class="seg-toggle">
        <button id="sLangEs" onclick="setLang('es')">ES</button>
        <button id="sLangEn" onclick="setLang('en')">EN</button>
      </div>
    </div>
    <div class="setting-row">
      <div class="setting-icon" id="themePaletteIcon"></div>
      <div class="setting-label" id="themeLabel"></div>
      <div class="theme-picker" id="themePicker"></div>
    </div>
    <button id="settingsDone" onclick="closeOverlay('settingsOverlay')" style="width:100%;height:46px;border-radius:12px;background:var(--input-bg);border:1px solid var(--divider);color:var(--fg);font-size:13px;font-weight:500;margin-top:16px"></button>
  </div>
</div>

<script src="js/app.js?v=15"></script>
</body>
</html>
